      - name: Cymatics Sound Visualization System
        location: Independent Hardware Project
        start_date: 2020
        end_date: 2024
        summary: Optical and acoustic system projecting sound-generated water patterns for hearing-impaired audiences.
        highlights:
          - Designed optical system combining concave mirror, convex lens, and speaker-driven resonance chamber to project sound-generated water patterns onto ceilings for hearing-impaired audiences.
          - Evolved from Arduino laser harp prototype to exhibition-scale installation through systematic calibration of focal length, light angle, and water depth.
          - Exhibited at China Academy of Art (2024); demonstrated to 110,000+ visitors.

      - name: Self-Adaptive RL Agent for Dynamic Environments
        location: Independent Researcher & Project Manager · PKU-Stanford Gen-AI Program
        start_date: 2024-11
        end_date: 2025-02
        summary: Dual-layer reinforcement learning framework for dynamic maze environments.
        highlights:
          - Designed dual-layer reinforcement learning framework combining fast adaptation and a reflection mechanism on top of a Q-learning baseline.
          - Implemented confidence-based exploration with multi-dimensional scoring (path efficiency, reward stability, success rate) and priority experience replay with softmax sampling.
          - Achieved 32.7% improvement in success rate and 7.8% reduction in average steps in a dynamic 10×10 maze over 30 independent runs.
          - Published in YSA Journal (13% acceptance rate).

      - name: AI Art Perception Study
        location: Lead Researcher
        start_date: 2024-09
        end_date: 2025-05
        summary: Statistical mediation analysis of perceived creativity and emotional response to AI vs. human art.
        highlights:
          - Conducted 56-participant study (672 data points) examining perceived creativity as a mediator between art source and emotional response.
          - Performed regression analysis and reliability testing.

      - name: NY Academy of Sciences Ethical AI Challenge
        location: Team Lead & Programmer
        start_date: 2024-10
        end_date: 2024-12
        summary: Ethical governance and deepfake detection for the NYAS Ethical AI Challenge.
        highlights:
          - Managed a multicultural team of 6 members from six countries, coordinating across multiple time zones.
          - Developed a comprehensive ethical governance framework alongside technical deepfake detection mechanisms.

